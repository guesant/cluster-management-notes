name: Qualidade dos workflows

on:
  push:
    branches:
      - main
    paths:
      - .github/**
  pull_request:
    paths:
      - .github/**
  workflow_dispatch:

permissions: {}

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      checks: write
      contents: read
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Validar workflows
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: any
          filter_mode: nofilter
          reporter: github-check

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Auditar GitHub Actions
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          advanced-security: true
          annotations: false

          min-severity: informational
          min-confidence: low

          config: .github/zizmor.yml

          persona: auditor
          version: 1.27.0
