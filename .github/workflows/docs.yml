name: Documentação

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - astro.config.mjs
      - tsconfig.json
      - src/**
      - public/**
      - .markdownlint-cli2.jsonc
      - eslint.config.mjs
      - .github/workflows/docs.yml
  pull_request:
    paths:
      - package.json
      - package-lock.json
      - astro.config.mjs
      - tsconfig.json
      - src/**
      - public/**
      - .markdownlint-cli2.jsonc
      - eslint.config.mjs
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Validar e gerar site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: read
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Configurar GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/configure-pages@v6

      - name: Preparar Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Validar Markdown e MDX
        run: npm run lint

      - name: Gerar site com Astro Starlight
        run: npm run build

      - name: Verificar links do site gerado
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: >-
            --no-progress
            --max-concurrency 8
            dist
          fail: true

      - name: Enviar artefato do GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Publicar no GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar site
        id: deployment
        uses: actions/deploy-pages@v5
