{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rancher
  namespace: {{ .Release.Namespace | quote }}
spec:
  parentRefs:
    - name: {{ required "gateway.name é obrigatório" .Values.gateway.name | quote }}
      namespace: {{ required "gateway.namespace é obrigatório" .Values.gateway.namespace | quote }}
      sectionName: {{ required "gateway.listener é obrigatório" .Values.gateway.listener | quote }}
  hostnames:
    - {{ required "rancher.hostname é obrigatório" .Values.rancher.hostname | quote }}
  rules:
    - backendRefs:
        - name: {{ required "gateway.serviceName é obrigatório" .Values.gateway.serviceName | quote }}
          port: {{ required "gateway.servicePort é obrigatório" .Values.gateway.servicePort }}
{{- end }}
