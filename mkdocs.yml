# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json

site_name: cluster-management-notes
site_description: Anotações sobre clusters K3s de nó único ou multinó, com conceitos, melhores práticas, guias passo a passo e scripts.
site_url: https://guesant.github.io/cluster-management-notes/

repo_name: guesant/cluster-management-notes
repo_url: https://github.com/guesant/cluster-management-notes
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  language: pt-BR
  features:
    - content.action.edit
    - content.action.view
    - content.code.copy
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Usar tema escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Usar tema claro

plugins:
  - search:
      lang: pt

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Início: index.md
  - Ensaios:
      - Cluster K3s: guides/k3s.md
  - Fundamentos:
      - Kubernetes: k8s/concepts.md
      - Arquitetura do K3s: k8s/k3s/architecture.md
      - Planejamento do K3s: k8s/k3s/planning.md
  - Segurança dos hosts:
      - Firewall: security/hosts/firewall.md
      - Portas publicadas pelo Docker: security/hosts/docker-published-ports.md
      - Hardening do SSH: security/hosts/ssh.md
      - Fail2Ban: security/hosts/fail2ban.md
  - Kubernetes:
      - K3s:
          - Primeiro servidor: k8s/k3s/cluster/first-server.md
          - Adicionar servidor: k8s/k3s/cluster/add-server.md
          - Adicionar agente: k8s/k3s/cluster/add-agent.md
          - Firewall dos nós: k8s/k3s/networking/host-firewall.md
          - Backup, atualização e remoção: k8s/k3s/operations/cluster-maintenance.md
          - Checklist operacional: k8s/k3s/operations/checklist.md
      - Rede:
          - Gateway API e Traefik: k8s/networking/gateway-api-and-traefik.md
          - NetworkPolicy: k8s/networking/network-policies.md
      - Segurança e acesso:
          - Acesso remoto: k8s/security/remote-access.md
          - Identidade e RBAC: k8s/security/identity-and-rbac.md
      - Extensões:
          - cert-manager: k8s/extensions/cert-manager.md
          - Longhorn: k8s/extensions/longhorn.md
  - Estratégias:
      - GitOps com Argo CD:
          - Argo CD: strategies/deployment/argo-cd.md
          - Bootstrap GitOps: strategies/deployment/gitops-bootstrap.md
          - Templates copiáveis: strategies/deployment/templates.md
      - Gestão de segredos:
          - Infisical: strategies/secrets/infisical.md
  - Referência:
      - Escopo, convenções e versões: reference/conventions.md
      - Ferramentas de linha de comando: reference/command-line-tools.md

copyright: Conteúdo disponibilizado pelo projeto cluster-management-notes.
