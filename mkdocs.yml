# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json

site_name: cluster-management-notes
site_description: Anotações sobre clusters K3s de nó único ou multinó, com conceitos, melhores práticas, guias passo a passo e scripts.
site_url: https://guesant.github.io/cluster-management-notes/

repo_name: guesant/cluster-management-notes
repo_url: https://github.com/guesant/cluster-management-notes
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  language: pt-BR
  features:
    - content.action.edit
    - content.action.view
    - content.code.copy
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Usar tema escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Usar tema claro

plugins:
  - search:
      lang: pt

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Início: index.md
  - Fundamentos:
      - Kubernetes e K3s: concepts/kubernetes-and-k3s.md
      - Planejamento e segredos: concepts/planning.md
  - Preparação dos hosts:
      - Firewall: preparation/firewall.md
      - Hardening do SSH: preparation/ssh.md
      - Fail2Ban: preparation/fail2ban.md
  - Criação do cluster:
      - Nó único / primeiro servidor: cluster/first-server.md
      - Adicionar servidor: cluster/add-server.md
      - Adicionar agente: cluster/add-agent.md
  - Rede e segurança:
      - Gateway API e Traefik: networking/gateway-api-and-traefik.md
      - NetworkPolicy: networking/network-policies.md
      - Acesso remoto: security/remote-access.md
      - Identidade e RBAC: security/identity-and-rbac.md
  - Serviços:
      - cert-manager: services/cert-manager.md
      - Longhorn: services/longhorn.md
  - GitOps e segredos:
      - Argo CD: gitops/argo-cd.md
      - Bootstrap GitOps: gitops/bootstrap.md
      - Infisical: gitops/infisical.md
  - Operação:
      - Backup, atualização e remoção: operations/cluster-maintenance.md
      - Checklist operacional: operations/checklist.md
  - Referência:
      - Ferramentas de linha de comando: reference/command-line-tools.md
      - Templates copiáveis: reference/templates.md

copyright: Conteúdo disponibilizado pelo projeto cluster-management-notes.
